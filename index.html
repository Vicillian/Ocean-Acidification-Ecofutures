<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-EN">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    

    <head>
        <title>Hide 'n Show</title>
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    </head>

    <body class="">

<div class="firstMenu">
    
        <button type="button" onclick="activateSecondMenu()">Go to Start Menu</button>
    

        <p id="position-log">Mouse Position: (X: 0, Y: 0)</p>
        
</div>

        <p id="position-log">Mouse Position: (X: 0, Y: 0)</p>


<div class="secondMenu" hidden>

</div>

    <audio id="sadViolin" src="sadViolin.mp3"></audio>
    <!------------------------------------------------------------------------------------------------------------------------------------>
    </body>




<script>

function activateSecondMenu() {
  // This removes the 'hidden' attribute we added in HTML
  document.querySelector('.secondMenu').removeAttribute('hidden');
  
  // And hides the intro
  document.querySelector('.firstMenu').setAttribute('hidden', true);
}
    
const positionElement = document.getElementById('position-log');
        // Add a mousemove event listener to the entire document
        document.addEventListener('mousemove', (event) => {
            // Get the X and Y coordinates from the event object
            const x = event.clientX; // X coordinate relative to the viewport
            const y = event.clientY; // Y coordinate relative to the viewport
            if (teeth == 1){
                moveMoused();
            }

            // Update the text content to display the current position
            positionElement.textContent = `Mouse Position: (X: ${x}, Y: ${y})`;
        });

const ugh = 1;

let teeth = 1;
    
function moveMoused(){
        playAudio();
        teeth = 2;
}    


    
const sadViolin = document.getElementById("sadViolin");
console.log("Audio element:", sadViolin);

function playAudio() {
  sadViolin.play();
  sadViolin.volume = 0.2;
  console.log("sad violin is playing");
}

function pauseAudio() {
  sadViolin.pause();
}

function bingBong(){
    playAudio();
}



    
</script>


</html>
