<script>

function startStory() {
  const overlay = document.getElementById('fadeOverlay');
  
  // 1. Make the black overlay visible (this triggers the CSS transition)
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all'; // Prevents clicking other things while fading

  // 2. Wait for the fade (1500ms = 1.5 seconds) then change page
  setTimeout(function() {
    window.location.href = "startStory.html";
  }, 1500); 
}

function playButtonClicked() {

    buttonclickSound();
    startStory();

function dissolveElement(elementId) {
  const thText = document.getElementById(elementId);
  // 1. Start fading
  thText.classList.add('fade-out');
  
  // 2. Wait for animation to finish, then set display:none
  thText.addEventListener('transitionend', function() {
    thText.classList.add('hidden');
  }, { once: true });
}

<style>

.fade-out {
