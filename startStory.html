    <body class="">

<!-- dis is de black overlay so page can fade out wagwan man -->
<div id="fadeOverlay" style="
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  background: black; 
  opacity: 0; 
  pointer-events: none; 
  transition: opacity 1.5s; 
  z-index: 9999;">
</div>



<div class="firstMenu">
    
        <button style="display: flex; position: relative; left: 45%; top: 290px;" type="button" onclick="activateSecondMenu()">Start this page</button>
    

</div>



<div class="secondMenu" hidden>

    <button onclick="startClicked()" style="background: none; border: none; cursor: pointer;">
        <!--<img src="playButton.png" alt="Start Game" height="100px" style="display: flex; position: relative; left: 500px; top: 350px;" > -->
    </button>
    
          <img style="z-index: 100;" id="parvenuPeak" src="Coho the Broho.png" alt="Coho the Broho. A very handsome salmon." >

          <p>That's it. There's nothing else. It's just the fish spinning to music.<br>
          Go back a page. You clicked the wrong thing. make sure to click the "Start Game Test" Button</p>


</div>

    <audio id="sadViolin" src="sadViolin.mp3"></audio>
    <audio id="buttonClick" src="buttonClick.mp3"></audio>
    <audio controls id="CohoTheBrohoThemeSong" src="onlyaFish.mp3"></audio>
    <!------------------------------------------------------------------------------------------------------------------------------------>
    </body>




<script>

$(document).mousemove(function(event) {
  $("#parvenuPeak").css({
    left: event.pageX - 60,
    top: event.pageY - 60,
    position: "absolute"
  });
});

function activateSecondMenu() {
    // This removes the 'hidden' attribute we added in HTML
    document.querySelector('.secondMenu').removeAttribute('hidden');
  
    // And hides the intro
    document.querySelector('.firstMenu').setAttribute('hidden', true);
    playAudio();
    console.log("Audio's running now :o");
    document.body.style.backgroundImage = "url('CohoBackground.png')";
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundRepeat = "no-repeat";

    console.log("dis do anytin?")
  const elem = document.documentElement; // Targets the entire page

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) { /* Safari */
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) { /* IE11 */
    elem.msRequestFullscreen();
  }
}


function playAudio() {
    CohoTheBrohoThemeSong.loop = true;
    CohoTheBrohoThemeSong.play();
    CohoTheBrohoThemeSong.volume = 0.05;
    console.log("Bckgrnd music is playing");
}


</script>

<style>

html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }


#parvenuPeak {
/* Adjust the angle as needed */
  transform: rotate(45deg);
  animation: rotation 3s infinite linear;
  margin-top: 100px;
  margin-left: auto;
  margin-right: auto;
  display: block;
  width: 10%;
}

/* Keyframes for rotation animation so Parvenu Peak can go wild */
@keyframes rotation {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(359deg);
  }
}


</style>
